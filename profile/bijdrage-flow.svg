<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="100%" style="max-width:900px">
  <style>
    .panel { fill: #ffffff; stroke: #d0d7de; stroke-width: 1.5; }
    .panel-header { fill: #f6f8fa; }
    .step-num { font: bold 14px system-ui, sans-serif; fill: #0969da; }
    .step-title { font: 600 13px system-ui, sans-serif; fill: #1f2328; }
    .small { font: 11px system-ui, sans-serif; fill: #656d76; }
    .small-dark { font: 11px system-ui, sans-serif; fill: #1f2328; }
    /* Shields.io for-the-badge look */
    .badge-label { fill: #555555; }
    .badge-green { fill: #238636; }
    .badge-blue  { fill: #0969da; }
    .badge-text  { font: bold 9px system-ui, sans-serif; fill: #ffffff; text-anchor: middle; letter-spacing: 0.4px; }
    .btn-gray  { fill: #f6f8fa; stroke: #d0d7de; stroke-width: 1; }
    .btn-green { fill: #1f883d; }
    .btn-text  { font: 600 12px system-ui, sans-serif; fill: #ffffff; text-anchor: middle; }
    .arrow-path { stroke: #0969da; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .pulse-ring { fill: none; stroke: #1f883d; stroke-width: 2; opacity: 0; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#0969da"/>
    </marker>
  </defs>

  <!-- ============ Stap 1: README met shields.io-badges ============ -->
  <rect class="panel" x="10" y="20" width="230" height="280" rx="6"/>
  <rect class="panel-header" x="10" y="20" width="230" height="30" rx="6"/>
  <rect class="panel-header" x="10" y="40" width="230" height="10"/>
  <text class="step-num" x="22" y="40">Stap 1</text>
  <text class="step-title" x="22" y="72">Op de README</text>
  <text class="step-title" x="22" y="88">van een repo</text>
  <text class="small" x="22" y="110">Zie de twee knoppen</text>
  <text class="small" x="22" y="124">direct onder de titel:</text>

  <!-- Bijdragen-badge (enkele kleur) -->
  <g>
    <rect class="badge-green" x="22" y="142" width="190" height="26" rx="2"/>
    <text class="badge-text" x="117" y="159">📝 OPEN EEN BERICHT</text>
    <circle cx="117" cy="155" r="22" class="pulse-ring">
      <animate attributeName="r" values="22;38;22" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0;0.9" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Discussions-badge -->
  <g>
    <rect class="badge-blue" x="22" y="182" width="220" height="26" rx="2"/>
    <text class="badge-text" x="132" y="199">💬 MEEPRATEN IN DISCUSSIONS</text>
  </g>

  <text class="small" x="22" y="240">Klik op de groene knop.</text>
  <text class="small" x="22" y="258" style="font-style:italic">De blauwe gaat naar</text>
  <text class="small" x="22" y="272" style="font-style:italic">discussions — voor</text>
  <text class="small" x="22" y="286" style="font-style:italic">vragen zonder actie.</text>

  <!-- Arrow 1 → 2 -->
  <path class="arrow-path" d="M 245 170 L 268 170"/>

  <!-- ============ Stap 2: Template-picker ============ -->
  <rect class="panel" x="275" y="20" width="220" height="280" rx="6"/>
  <rect class="panel-header" x="275" y="20" width="220" height="30" rx="6"/>
  <rect class="panel-header" x="275" y="40" width="220" height="10"/>
  <text class="step-num" x="287" y="40">Stap 2</text>
  <text class="step-title" x="287" y="75">Kies een template</text>

  <rect class="btn-gray" x="287" y="90" width="195" height="44" rx="3" fill="#ddf4ff" stroke="#0969da" stroke-width="1.5"/>
  <text class="small-dark" x="295" y="107" style="font-weight:600">📝 Bijdrage aanbieden</text>
  <text class="small" x="295" y="123" style="font-size:10px">Ik heb iets om te delen</text>
  <circle cx="385" cy="112" r="24" class="pulse-ring">
    <animate attributeName="r" values="24;38;24" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="opacity" values="0.9;0;0.9" dur="2s" repeatCount="indefinite" begin="0.5s"/>
  </circle>

  <rect class="btn-gray" x="287" y="142" width="195" height="44" rx="3"/>
  <text class="small-dark" x="295" y="159" style="font-weight:600">🔧 Fout of verbetering</text>
  <text class="small" x="295" y="175" style="font-size:10px">Iets klopt niet of kan beter</text>

  <rect class="btn-gray" x="287" y="194" width="195" height="34" rx="3"/>
  <text class="small-dark" x="295" y="209" style="font-weight:600">💬 Meediscussiëren</text>
  <text class="small" x="295" y="222" style="font-size:10px">Vragen zonder directe actie</text>

  <rect class="btn-gray" x="287" y="236" width="195" height="34" rx="3"/>
  <text class="small-dark" x="295" y="251" style="font-weight:600">❓ Geen GitHub-account?</text>
  <text class="small" x="295" y="264" style="font-size:10px">Gratis account in 2 minuten</text>

  <!-- Arrow 2 → 3 -->
  <path class="arrow-path" d="M 500 170 L 523 170"/>

  <!-- ============ Stap 3: Formulier ============ -->
  <rect class="panel" x="530" y="20" width="180" height="280" rx="6"/>
  <rect class="panel-header" x="530" y="20" width="180" height="30" rx="6"/>
  <rect class="panel-header" x="530" y="40" width="180" height="10"/>
  <text class="step-num" x="542" y="40">Stap 3</text>
  <text class="step-title" x="542" y="75">Vul de vragen in</text>

  <text class="small" x="542" y="100">Wat wil je bijdragen?</text>
  <rect class="btn-gray" x="542" y="106" width="156" height="26"/>
  <text class="small-dark" x="550" y="124">Beleid datalekken...</text>

  <text class="small" x="542" y="150">Voor welk onderwerp?</text>
  <rect x="546" y="156" width="10" height="10" fill="#0969da" rx="1"/>
  <text class="small-dark" x="560" y="166">Privacy</text>
  <rect x="546" y="170" width="10" height="10" fill="#0969da" rx="1"/>
  <text class="small-dark" x="560" y="180">Informatiebeveiliging</text>

  <text class="small" x="542" y="204">Bijlage?</text>
  <rect class="btn-gray" x="542" y="210" width="156" height="42" stroke-dasharray="4 2"/>
  <text class="small" x="550" y="226">Sleep je bestand hier</text>
  <text class="small" x="550" y="241">(of laat leeg)</text>

  <text class="small" x="542" y="275" style="font-style:italic">Alleen velden die jou</text>
  <text class="small" x="542" y="289" style="font-style:italic">relevant lijken.</text>

  <!-- Arrow 3 → 4 -->
  <path class="arrow-path" d="M 715 170 L 738 170"/>

  <!-- ============ Stap 4: Submit ============ -->
  <rect class="panel" x="745" y="20" width="145" height="280" rx="6"/>
  <rect class="panel-header" x="745" y="20" width="145" height="30" rx="6"/>
  <rect class="panel-header" x="745" y="40" width="145" height="10"/>
  <text class="step-num" x="757" y="40">Stap 4</text>
  <text class="step-title" x="757" y="75">Submit</text>

  <text class="small" x="757" y="105">We reageren</text>
  <text class="small" x="757" y="120">binnen een week</text>
  <text class="small" x="757" y="135">en helpen je</text>
  <text class="small" x="757" y="150">verder.</text>

  <rect class="btn-green" x="757" y="170" width="125" height="32" rx="6"/>
  <text class="btn-text" x="819" y="190">Submit new issue</text>
  <circle cx="819" cy="186" r="22" class="pulse-ring">
    <animate attributeName="r" values="22;36;22" dur="2s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="opacity" values="0.9;0;0.9" dur="2s" repeatCount="indefinite" begin="1s"/>
  </circle>

  <text class="step-title" x="757" y="232" fill="#1f883d">🎉 Klaar!</text>
  <text class="small" x="757" y="252">Geen account?</text>
  <text class="small" x="757" y="266">Zie signup-link</text>
  <text class="small" x="757" y="280">in het menu.</text>
</svg>
