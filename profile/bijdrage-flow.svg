<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 280" width="100%" style="max-width:860px">
  <style>
    .panel { fill: #ffffff; stroke: #d0d7de; stroke-width: 1.5; }
    .panel-header { fill: #f6f8fa; }
    .step-num { font: bold 14px system-ui, sans-serif; fill: #0969da; }
    .step-title { font: 600 13px system-ui, sans-serif; fill: #1f2328; }
    .small { font: 11px system-ui, sans-serif; fill: #656d76; }
    .code { font: 11px ui-monospace, monospace; fill: #1f2328; }
    .btn-green { fill: #1f883d; }
    .btn-blue  { fill: #0969da; }
    .btn-gray  { fill: #f6f8fa; stroke: #d0d7de; stroke-width: 1; }
    .btn-text  { font: 600 11px system-ui, sans-serif; fill: #ffffff; text-anchor: middle; }
    .btn-text-dark { font: 600 11px system-ui, sans-serif; fill: #1f2328; text-anchor: middle; }
    .arrow-path { stroke: #0969da; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
    .cursor { fill: #1f2328; }
    .pulse-ring { fill: none; stroke: #1f883d; stroke-width: 2; opacity: 0; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#0969da"/>
    </marker>
  </defs>

  <!-- Panel 1: Issues tab -->
  <rect class="panel" x="10" y="20" width="200" height="230" rx="6"/>
  <rect class="panel-header" x="10" y="20" width="200" height="30" rx="6"/>
  <rect class="panel-header" x="10" y="40" width="200" height="10"/>
  <text class="step-num" x="22" y="40">Stap 1</text>
  <text class="step-title" x="22" y="75">Ga naar een repository</text>
  <text class="small" x="22" y="95">github.com/security-</text>
  <text class="small" x="22" y="110">commons-nl/anonimizer</text>
  <text class="step-title" x="22" y="140">Klik op "Issues"</text>
  <rect class="btn-gray" x="22" y="155" width="80" height="26" rx="4"/>
  <text class="btn-text-dark" x="62" y="172">Code</text>
  <rect x="106" y="155" width="80" height="26" rx="4" fill="#ddf4ff" stroke="#0969da" stroke-width="1.5"/>
  <text class="btn-text-dark" x="146" y="172" fill="#0969da">Issues</text>
  <circle cx="146" cy="168" r="14" class="pulse-ring">
    <animate attributeName="r" values="14;22;14" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Arrow 1→2 -->
  <path class="arrow-path" d="M 215 140 L 238 140"/>

  <!-- Panel 2: New Issue -->
  <rect class="panel" x="245" y="20" width="200" height="230" rx="6"/>
  <rect class="panel-header" x="245" y="20" width="200" height="30" rx="6"/>
  <rect class="panel-header" x="245" y="40" width="200" height="10"/>
  <text class="step-num" x="257" y="40">Stap 2</text>
  <text class="step-title" x="257" y="75">Klik op "New issue"</text>
  <rect class="btn-green" x="257" y="90" width="100" height="30" rx="6"/>
  <text class="btn-text" x="307" y="110">New issue</text>
  <circle cx="307" cy="105" r="16" class="pulse-ring">
    <animate attributeName="r" values="16;26;16" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="2s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <text class="small" x="257" y="155">Je ziet nu drie opties:</text>
  <rect class="btn-gray" x="257" y="165" width="175" height="20" rx="3"/>
  <text class="small" x="265" y="178">📝 Bijdrage aanbieden</text>
  <rect class="btn-gray" x="257" y="190" width="175" height="20" rx="3"/>
  <text class="small" x="265" y="203">🔧 Fout of verbetering</text>
  <rect class="btn-gray" x="257" y="215" width="175" height="20" rx="3"/>
  <text class="small" x="265" y="228">💬 Meediscussiëren</text>

  <!-- Arrow 2→3 -->
  <path class="arrow-path" d="M 450 140 L 473 140"/>

  <!-- Panel 3: Template -->
  <rect class="panel" x="480" y="20" width="170" height="230" rx="6"/>
  <rect class="panel-header" x="480" y="20" width="170" height="30" rx="6"/>
  <rect class="panel-header" x="480" y="40" width="170" height="10"/>
  <text class="step-num" x="492" y="40">Stap 3</text>
  <text class="step-title" x="492" y="75">Vul vragen in</text>
  <text class="small" x="492" y="95">Wat wil je bijdragen?</text>
  <rect class="btn-gray" x="492" y="102" width="146" height="22"/>
  <text class="small" x="498" y="118">Beleid datalekken...</text>
  <text class="small" x="492" y="140">Voor welk onderwerp?</text>
  <rect x="496" y="146" width="10" height="10" fill="#0969da" rx="1"/>
  <text class="small" x="510" y="156">Privacy</text>
  <text class="small" x="492" y="178">Bijlagen?</text>
  <rect class="btn-gray" x="492" y="185" width="146" height="40" stroke-dasharray="4 2"/>
  <text class="small" x="498" y="200">Sleep hier je bestand</text>
  <text class="small" x="498" y="215">(of beschrijf het)</text>

  <!-- Arrow 3→4 -->
  <path class="arrow-path" d="M 655 140 L 678 140"/>

  <!-- Panel 4: Submit -->
  <rect class="panel" x="685" y="20" width="165" height="230" rx="6"/>
  <rect class="panel-header" x="685" y="20" width="165" height="30" rx="6"/>
  <rect class="panel-header" x="685" y="40" width="165" height="10"/>
  <text class="step-num" x="697" y="40">Stap 4</text>
  <text class="step-title" x="697" y="75">Submit</text>
  <text class="small" x="697" y="95">We reageren zo snel</text>
  <text class="small" x="697" y="110">mogelijk en helpen je</text>
  <text class="small" x="697" y="125">verder met de rest.</text>
  <rect class="btn-green" x="697" y="150" width="140" height="30" rx="6"/>
  <text class="btn-text" x="767" y="170">Submit new issue</text>
  <circle cx="767" cy="165" r="18" class="pulse-ring">
    <animate attributeName="r" values="18;28;18" dur="2s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="2s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <text class="small" x="697" y="210">🎉 Klaar!</text>
  <text class="small" x="697" y="228">Geen GitHub-account?</text>
  <text class="small" x="697" y="243" fill="#0969da">Zie signup-link</text>
</svg>
